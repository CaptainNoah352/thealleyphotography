<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Alley Photography — Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    .logo__name {
      font-family: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 800;
      font-size: 3rem;
      letter-spacing: -0.01em;
      color: #000;
      text-transform: lowercase;
      line-height: 1.1;
    }

    .logo__divider {
      width: 100%;
      height: 1px;
      background: #000;
      margin: 6px 0;
    }

    .logo__tagline {
      font-family: 'Barlow', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      color: #000;
      text-transform: lowercase;
      text-indent: 0.4em; /* offset the trailing letter-spacing so text stays visually centered */
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo__name">demas rusli</span>
    <div class="logo__divider"></div>
    <span class="logo__tagline">photography</span>
  </div>
</body>
</html>
