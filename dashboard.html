<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Vault - Library</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <div class="nav-brand">🎮 Game Vault</div>
        <div class="nav-user">
            <span id="welcomeUser">Welcome!</span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <main class="dashboard">
        <header class="dashboard-header">
            <h1>Your Game Storage Hub</h1>
            <p>Store game entries in your browser using Local Storage.</p>
        </header>

        <section class="add-game-panel">
            <h2>Add a game</h2>
            <form id="addGameForm" class="add-game-form">
                <div class="field-group">
                    <label for="gameName">Game Name</label>
                    <input id="gameName" type="text" required placeholder="Space Runner">
                </div>
                <div class="field-group">
                    <label for="gameUrl">Game URL or path</label>
                    <input id="gameUrl" type="text" required placeholder="games/space-runner.html or https://...">
                </div>
                <div class="field-group">
                    <label for="gameIcon">Icon</label>
                    <input id="gameIcon" type="text" maxlength="2" placeholder="🎮">
                </div>
                <button type="submit" class="btn-primary">Save Game</button>
            </form>
            <p class="storage-note">Tip: Your games are saved per browser/device.</p>
        </section>

        <div class="games-grid" id="gamesGrid"></div>
    </main>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="gameTitle">Now Playing</h2>
                <button onclick="closeGame()" class="btn-close">&times;</button>
            </div>
            <iframe id="gameFrame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const STORAGE_KEY = 'gameVaultGames';

        checkAuth();
        loadGames();

        document.getElementById('addGameForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const name = document.getElementById('gameName').value.trim();
            const url = document.getElementById('gameUrl').value.trim();
            const icon = document.getElementById('gameIcon').value.trim() || '🎮';

            if (!name || !url) {
                return;
            }

            const games = getGames();
            games.push({
                id: Date.now(),
                name,
                url,
                icon
            });

            saveGames(games);
            this.reset();
            loadGames();
        });

        function getGames() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                return [];
            }

            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                console.error('Invalid games storage. Resetting.', error);
                return [];
            }
        }

        function saveGames(games) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(games));
        }

        function loadGames() {
            const games = getGames();
            const grid = document.getElementById('gamesGrid');

            if (games.length === 0) {
                grid.innerHTML = `
                    <article class="empty-state">
                        <h3>No games saved yet</h3>
                        <p>Add your first game with the form above.</p>
                    </article>
                `;
                return;
            }

            grid.innerHTML = games.map(game => `
                <article class="game-card" data-id="${game.id}">
                    <div class="game-thumbnail" onclick="playGame(${game.id})">
                        <div class="game-icon">${escapeHtml(game.icon)}</div>
                    </div>
                    <div class="game-info">
                        <h3>${escapeHtml(game.name)}</h3>
                        <p>${escapeHtml(game.url)}</p>
                        <div class="card-actions">
                            <button class="btn-card" onclick="playGame(${game.id})">Play</button>
                            <button class="btn-card btn-danger" onclick="removeGame(${game.id})">Remove</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function playGame(id) {
            const game = getGames().find(item => item.id === id);
            if (!game) {
                return;
            }

            document.getElementById('gameTitle').textContent = `Now Playing: ${game.name}`;
            document.getElementById('gameFrame').src = game.url;
            document.getElementById('gameModal').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        function removeGame(id) {
            const games = getGames().filter(game => game.id !== id);
            saveGames(games);
            loadGames();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                closeGame();
            }
        }
    </script>
</body>
</html>
